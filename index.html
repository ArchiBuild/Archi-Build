<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDtKBKAh48nlOyNyPsq-Sly9CuDNGvHu8k",
  authDomain: "archibuild-ce4c2.firebaseapp.com",
  databaseURL: "https://archibuild-ce4c2-default-rtdb.firebaseio.com",
  projectId: "archibuild-ce4c2",
  storageBucket: "archibuild-ce4c2.firebasestorage.app",
  messagingSenderId: "1093896650127",
  appId: "1:1093896650127:web:4669bfe7cdd1b9f7dc1ffa",
  measurementId: "G-9C3Q946JNB"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const ratingsRef = ref(db,"ratings");
const commentsRef = ref(db,"comments");


// 🔒 JEDNA OCENA NA URZĄDZENIE
window.addRating=function(stars){

if(localStorage.getItem("rated")){
showWarning("Możesz ocenić tylko raz z tego urządzenia!");
return;
}

push(ratingsRef,{rating:stars});
localStorage.setItem("rated","true");
};


// LICZENIE ŚREDNIEJ
onValue(ratingsRef,(snapshot)=>{
let total=0,count=0;

snapshot.forEach(child=>{
total+=child.val().rating;
count++;
});

let avg=count?(total/count).toFixed(1):0;

document.getElementById("ratingInfo").innerText=
"Średnia ocena: "+avg+" ⭐ ("+count+" ocen)";
});


// DODAWANIE KOMENTARZA
window.addComment=function(){

let name=document.getElementById("name").value.trim();
let comment=document.getElementById("comment").value.trim();

if(name===""||comment===""){
showWarning("Wpisz imię i komentarz!");
return;
}

push(commentsRef,{name:name,comment:comment});
document.getElementById("comment").value="";
};


// WYŚWIETLANIE KOMENTARZY
onValue(commentsRef,(snapshot)=>{
let container=document.getElementById("comments");
container.innerHTML="";

snapshot.forEach(child=>{
let data=child.val();

container.innerHTML+=
`<div class="comment">
<strong>${data.name}</strong><br>
${data.comment}
</div>`;
});
});

function showWarning(text){
let box=document.getElementById("warningBox");
box.innerText=text;
box.classList.add("show");
setTimeout(()=>box.classList.remove("show"),3000);
}
</script>
